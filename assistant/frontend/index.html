<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procurement Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
</head>
<body>
  <main class="app">
    <!-- Header -->
    <header class="topbar">
      <div class="identity">
        <span class="avatar" aria-hidden="true">
          <svg viewBox="0 0 22 22" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="10" height="10" fill="#F25022"/>
            <rect x="12" y="0" width="10" height="10" fill="#7FBA00"/>
            <rect x="0" y="12" width="10" height="10" fill="#00A4EF"/>
            <rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
          </svg>
        </span>
        <div class="identity-text">
          <h1>Procurement Assistant</h1>
          <p>Ask about the European procurement market</p>
        </div>
      </div>
      <div class="topbar-actions">
        <span class="wordmark">Microsoft</span>
        <button id="themeToggle" class="ghost-btn" title="Switch theme" aria-label="Switch theme">◐</button>
        <button id="clearBtn" class="ghost-btn" title="Clear conversation">Clear</button>
      </div>
    </header>

    <div id="sampleBanner" class="sample-banner" hidden>
      Showing illustrative sample data — connect the Gold tables for live figures.
    </div>

    <!-- Conversation -->
    <section id="thread" class="thread" aria-live="polite">
      <!-- Empty state -->
      <div id="welcome" class="welcome">
        <span class="avatar avatar-lg" aria-hidden="true">
          <svg viewBox="0 0 22 22" width="34" height="34" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="10" height="10" fill="#F25022"/>
            <rect x="12" y="0" width="10" height="10" fill="#7FBA00"/>
            <rect x="0" y="12" width="10" height="10" fill="#00A4EF"/>
            <rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
          </svg>
        </span>
        <h2>How can I help with procurement strategy?</h2>
        <p class="welcome-sub">Pick a question or ask your own.</p>
        <div id="quickGrid" class="quick-grid"></div>
      </div>
    </section>

    <!-- Composer -->
    <footer class="composer">
      <div class="input-pill">
        <input id="input" type="text" autocomplete="off"
               placeholder="Ask about countries, savings, SMEs, CPV categories…" />
        <button id="sendBtn" class="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M12 19V5M12 5l-6 6M12 5l6 6" fill="none" stroke="currentColor"
                  stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p class="disclaimer">Answers are grounded in the project's Gold tables.</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
